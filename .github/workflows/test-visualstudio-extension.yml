name: Visual Studio Extension Build

on:
  push:
    branches: [main]
    paths:
      - 'agent-support/visualstudio/**'
  pull_request:
    paths:
      - 'agent-support/visualstudio/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: agent-support/visualstudio

jobs:
  build:
    name: Build
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Fetch Sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/GitAiVS/GitAiVS.csproj

      - name: Build extension
        run: dotnet build src/GitAiVS/GitAiVS.csproj --no-restore --configuration Release

  test:
    name: Test
    needs: [build]
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Fetch Sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '8.0.x'

      - name: Run Tests
        run: dotnet test src/GitAiVS.Tests/GitAiVS.Tests.csproj --verbosity normal
